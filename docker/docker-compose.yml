version: '3.8'

services:
  seomonitor-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: seomonitor-mcp-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - TRANSPORT=${TRANSPORT:-http}
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - API_KEY=${API_KEY}
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - SEOMONITOR_BASE_URL=${SEOMONITOR_BASE_URL:-https://apigw.seomonitor.com}
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network

  # Optional: WebSocket variant
  seomonitor-mcp-ws:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: seomonitor-mcp-ws
    restart: unless-stopped
    ports:
      - "${WS_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - TRANSPORT=websocket
      - PORT=3002
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - API_KEY=${API_KEY}
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - SEOMONITOR_BASE_URL=${SEOMONITOR_BASE_URL:-https://apigw.seomonitor.com}
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network
    profiles:
      - websocket

networks:
  mcp-network:
    external: true
    name: docker_mcp-network

volumes:
  logs:
    driver: local
