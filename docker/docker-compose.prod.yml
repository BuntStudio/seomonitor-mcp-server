version: '3.8'

services:
  seomonitor-mcp:
    image: seomonitor/mcp-server:latest
    container_name: seomonitor-mcp-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - TRANSPORT=http
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - ENABLE_AUTH=true
      - CORS_ORIGIN=https://app.seomonitor.com,https://beta.seomonitor.com
      - SEOMONITOR_BASE_URL=https://apigw.seomonitor.com
    env_file:
      - .env.production
    volumes:
      - logs:/app/logs
      - type: bind
        source: ./config
        target: /app/config
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  # Load balancer/reverse proxy
  nginx:
    image: nginx:alpine
    container_name: seomonitor-mcp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - seomonitor-mcp
    networks:
      - mcp-network
    profiles:
      - production

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  logs:
    driver: local